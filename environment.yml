name: kinase-affinity
channels:
  - conda-forge
dependencies:
  - python=3.11
  # Chemistry
  - rdkit>=2023.09
  # ML / Data Science
  - scikit-learn>=1.3
  - xgboost>=2.0
  - pandas>=2.1
  - numpy>=1.25
  - scipy>=1.11
  - optuna>=3.4
  # Visualization
  - matplotlib>=3.8
  - seaborn>=0.13
  # Notebooks
  - jupyter
  - jupyterlab
